server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/coffeeDB}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
  # Force sessions to be truly in-memory and not persisted
  session:
    store-type: none
    timeout: 30m

jwt:
  # Override in production by setting the JWT_SECRET environment variable.
  # The default below is only for local development and is not secure.
  secret: ${JWT_SECRET:local-dev-only-change-me-in-production}

logging:
  level:
    org.springframework.security: DEBUG
    com.projects.coffee: DEBUG