<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Dashboard - Coffee Recipe Organizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23d97706' d='M2,21V19H20V21H2M20,8V5L18,5V8H20M20,3A2,2 0 0,1 22,5V8A2,2 0 0,1 20,10H18V13A4,4 0 0,1 14,17H8A4,4 0 0,1 4,13V3H20M16,5H6V13A2,2 0 0,0 8,15H14A2,2 0 0,0 16,13V5Z'/></svg>">
</head>
<body class="bg-gradient-to-br from-amber-50 to-orange-100 min-h-screen">
<div class="container mx-auto px-6 py-8">
    <div class="max-w-xl mx-auto bg-white rounded-xl shadow-sm overflow-hidden">
        <!-- Header -->
        <div class="bg-amber-600 px-6 py-8 text-center">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-white rounded-full mb-4 shadow-sm">
                <svg class="w-7 h-7 text-amber-600" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M2,21V19H20V21H2M20,8V5L18,5V8H20M20,3A2,2 0 0,1 22,5V8A2,2 0 0,1 20,10H18V13A4,4 0 0,1 14,17H8A4,4 0 0,1 4,13V3H20M16,5H6V13A2,2 0 0,0 8,15H14A2,2 0 0,0 16,13V5Z"/>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white" id="welcome-msg">Dashboard</h2>
            <p class="text-amber-100 mt-1 text-sm">What would you like to do?</p>
        </div>

        <!-- Nav Cards -->
        <div class="p-5 space-y-3">
            <a href="/my-recipes.html" class="flex items-center gap-4 p-4 bg-amber-50 hover:bg-amber-100 border border-amber-200 rounded-xl transition duration-200">
                <div class="flex-shrink-0 w-10 h-10 bg-amber-600 rounded-lg flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M6,2A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2H6M6,4H13V9H18V20H6V4M8,12V14H16V12H8M8,16V18H13V16H8Z"/>
                    </svg>
                </div>
                <div>
                    <div class="font-semibold text-gray-800 text-sm">My Recipes</div>
                    <div class="text-xs text-gray-500">Manage your personal collection</div>
                </div>
            </a>

            <a href="/create-recipe.html" class="flex items-center gap-4 p-4 bg-amber-600 hover:bg-amber-700 rounded-xl transition duration-200">
                <div class="flex-shrink-0 w-10 h-10 bg-white bg-opacity-20 rounded-lg flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/>
                    </svg>
                </div>
                <div>
                    <div class="font-semibold text-white text-sm">Create Recipe</div>
                    <div class="text-xs text-amber-100">Build something new</div>
                </div>
            </a>

            <a href="/public-recipes.html" class="flex items-center gap-4 p-4 bg-white hover:bg-gray-50 border border-gray-200 rounded-xl transition duration-200">
                <div class="flex-shrink-0 w-10 h-10 bg-gray-100 rounded-lg flex items-center justify-center">
                    <svg class="w-5 h-5 text-gray-600" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.57 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.57,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/>
                    </svg>
                </div>
                <div>
                    <div class="font-semibold text-gray-800 text-sm">Public Recipes</div>
                    <div class="text-xs text-gray-500">Browse the community</div>
                </div>
            </a>

            <a href="/shared-with-me.html" class="flex items-center gap-4 p-4 bg-white hover:bg-gray-50 border border-gray-200 rounded-xl transition duration-200">
                <div class="flex-shrink-0 w-10 h-10 bg-gray-100 rounded-lg flex items-center justify-center">
                    <svg class="w-5 h-5 text-gray-600" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M18,16.08C17.24,16.08 16.56,16.38 16.04,16.85L8.91,12.7C8.96,12.47 9,12.24 9,12C9,11.76 8.96,11.53 8.91,11.3L15.96,7.19C16.5,7.69 17.21,8 18,8A3,3 0 0,0 21,5A3,3 0 0,0 18,2A3,3 0 0,0 15,5C15,5.24 15.04,5.47 15.09,5.7L8.04,9.81C7.5,9.31 6.79,9 6,9A3,3 0 0,0 3,12A3,3 0 0,0 6,15C6.79,15 7.5,14.69 8.04,14.19L15.16,18.34C15.11,18.55 15.08,18.77 15.08,19C15.08,20.61 16.39,21.91 18,21.91C19.61,21.91 20.92,20.61 20.92,19A1.92,1.92 0 0,0 19,17.08C18.36,17.08 17.77,17.5 17.77,18.08C17.77,18.67 18.36,19.08 19,19.08Z"/>
                    </svg>
                </div>
                <div>
                    <div class="font-semibold text-gray-800 text-sm">Shared with Me</div>
                    <div class="text-xs text-gray-500">Recipes others have shared</div>
                </div>
            </a>

            <div class="pt-2 text-center">
                <a href="/logout" class="text-sm text-red-500 hover:text-red-700 font-medium transition duration-200">Sign out</a>
            </div>
        </div>
    </div>
</div>

<script>
    fetch('/api/user/profile', { credentials: 'include' })
        .then(r => r.json())
        .then(data => {
            if (data.username) {
                document.getElementById('welcome-msg').textContent = 'Welcome back, ' + data.username + '!';
            }
        })
        .catch(() => {});
</script>
</body>
</html>
