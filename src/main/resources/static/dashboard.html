<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Dashboard - Coffee Recipe Organizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-amber-50 to-orange-100 min-h-screen">
<div class="container mx-auto px-6 py-8">
    <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-sm overflow-hidden">
        <!-- Header -->
        <div class="bg-amber-600 px-6 py-6 text-center">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-white rounded-full mb-3">
                <svg class="w-6 h-6 text-amber-600" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M2,21V19H20V21H2M20,8V5L18,5V8H20M20,3A2,2 0 0,1 22,5V8A2,2 0 0,1 20,10H18V13A4,4 0 0,1 14,17H8A4,4 0 0,1 4,13V3H20M16,5H6V13A2,2 0 0,0 8,15H14A2,2 0 0,0 16,13V5Z"/>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white">Dashboard</h2>
            <p class="text-amber-100 mt-1 text-sm">Manage your coffee recipes and sharing</p>
        </div>

        <!-- Buttons -->
        <div class="px-6 py-6">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <a class="bg-amber-600 hover:bg-amber-700 text-white font-semibold py-3 px-4 rounded-lg shadow-sm transition duration-300 transform hover:scale-105 text-center text-sm"
                   href="/my-recipes.html">
                    My Recipes
                </a>
                <a class="bg-white hover:bg-gray-50 text-amber-600 font-semibold py-3 px-4 rounded-lg border-2 border-amber-600 shadow-sm transition duration-300 transform hover:scale-105 text-center text-sm"
                   href="/public-recipes.html">
                    Public Recipes
                </a>
                <a class="bg-white hover:bg-gray-50 text-amber-600 font-semibold py-3 px-4 rounded-lg border-2 border-amber-600 shadow-sm transition duration-300 transform hover:scale-105 text-center text-sm"
                   href="/shared-with-me.html">
                    Shared with Me
                </a>
                <a class="bg-amber-600 hover:bg-amber-700 text-white font-semibold py-3 px-4 rounded-lg shadow-sm transition duration-300 transform hover:scale-105 text-center text-sm"
                   href="/create-recipe.html">
                    Create New Recipe
                </a>
            </div>
            <div class="mt-4 text-center">
                <a class="inline-block bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded-lg shadow-sm transition duration-300 transform hover:scale-105 text-sm"
                   href="/logout">
                    Logout
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
