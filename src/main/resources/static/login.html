<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Coffee Recipe Organizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%23d97706' d='M2,21V19H20V21H2M20,8V5L18,5V8H20M20,3A2,2 0 0,1 22,5V8A2,2 0 0,1 20,10H18V13A4,4 0 0,1 14,17H8A4,4 0 0,1 4,13V3H20M16,5H6V13A2,2 0 0,0 8,15H14A2,2 0 0,0 16,13V5Z'/></svg>">
</head>
<body class="bg-gradient-to-br from-amber-50 to-orange-100 min-h-screen">
<div class="container mx-auto px-4 py-12">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow-sm overflow-hidden">
            <!-- Header -->
        <div class="bg-amber-600 px-6 py-6 text-center">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-white rounded-full mb-3">
                <svg class="w-6 h-6 text-amber-600" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M2,21V19H20V21H2M20,8V5L18,5V8H20M20,3A2,2 0 0,1 22,5V8A2,2 0 0,1 20,10H18V13A4,4 0 0,1 14,17H8A4,4 0 0,1 4,13V3H20M16,5H6V13A2,2 0 0,0 8,15H14A2,2 0 0,0 16,13V5Z"/>
                    </svg>
                </div>
            <h2 class="text-xl font-bold text-white">Welcome Back</h2>
            <p class="text-amber-100 mt-1 text-sm">Please sign in to continue</p>
            </div>

            <!-- Form -->
        <div class="px-6 py-6">
                <!-- Error Message -->
            <div class="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg hidden text-sm"
                     id="error-message">
                    Invalid username or password. Please try again.
                </div>

            <form action="/login" class="space-y-4" method="post">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1" for="username">
                            Username
                        </label>
                        <input type="text"
                               id="username"
                               name="username"
                               autocomplete="username"
                               required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition duration-200 text-sm"
                               placeholder="Enter your username" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1" for="password">
                            Password
                        </label>
                        <input type="password"
                               id="password"
                               name="password"
                               autocomplete="current-password"
                               required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition duration-200 text-sm"
                               placeholder="Enter your password" />
                    </div>

                    <button type="submit"
                            class="w-full bg-amber-600 hover:bg-amber-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-300 transform hover:scale-105 shadow-sm text-sm">
                        Sign In
                    </button>
                </form>

            <div class="mt-4 text-center">
                <p class="text-gray-600 text-sm">Don't have an account?</p>
                <a class="text-amber-600 hover:text-amber-700 font-medium text-sm" href="/auth/register">
                        Create one here
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Show error message if error parameter is present
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === 'true') {
            document.getElementById('error-message').classList.remove('hidden');
        }
    </script>
</body>
</html>
