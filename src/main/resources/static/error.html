<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Coffee Recipe Organizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-red-50 to-pink-100 min-h-screen">
    <div class="container mx-auto px-4 py-16">
        <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
            <!-- Error Header -->
            <div class="bg-red-600 px-6 py-8 text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-full mb-4">
                    <svg class="w-8 h-8 text-red-600" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M13,14H11V10H13M13,18H11V16H13M1,21H23L12,2L1,21Z"/>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-white">Oops!</h2>
                <p class="text-red-100 mt-2">Something went wrong</p>
            </div>

            <!-- Content -->
            <div class="px-6 py-8 text-center">
                <h1 class="text-xl font-semibold text-gray-800 mb-4">
                    Something went wrong
                </h1>

                <p class="text-gray-600 mb-6">
                    We're sorry, but something unexpected happened. Please try again or contact support if the problem persists.
                </p>

                <div class="space-y-3">
                    <a href="/"
                       class="block w-full bg-amber-600 hover:bg-amber-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-300 transform hover:scale-105 shadow-lg">
                        Go Home
                    </a>

                    <button onclick="history.back()"
                            class="block w-full bg-white hover:bg-gray-50 text-amber-600 font-semibold py-3 px-4 rounded-lg border-2 border-amber-600 transition duration-300 transform hover:scale-105">
                        Go Back
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
