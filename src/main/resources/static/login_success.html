<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Success - Coffee Recipe Organizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-green-50 to-emerald-100 min-h-screen">
    <div class="container mx-auto px-4 py-16">
        <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
            <!-- Success Header -->
            <div class="bg-green-600 px-6 py-8 text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-full mb-4">
                    <svg class="w-8 h-8 text-green-600" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M18.5,2A1.5,1.5 0 0,1 20,3.5V5H22V7H20V19A1,1 0 0,1 19,20H5A1,1 0 0,1 4,19V7H2V5H4V3.5A1.5,1.5 0 0,1 5.5,2H18.5M18,7H6V18H18V7M8,9H16V11H8V9M8,12H16V14H8V12M8,15H13V17H8V15Z"/>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-white">Welcome!</h2>
                <p class="text-green-100 mt-2">Login successful</p>
            </div>

            <!-- Content -->
            <div class="px-6 py-8 text-center">
                <h1 class="text-xl font-semibold text-gray-800 mb-4">
                    Success! You are now logged in.
                </h1>

                <p class="text-gray-600 mb-6">
                    You can now access all the features of the Coffee Recipe Organizer.
                </p>

                <div class="space-y-3">
                    <a href="/"
                       class="block w-full bg-amber-600 hover:bg-amber-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-300 transform hover:scale-105 shadow-lg">
                        Go to Dashboard
                    </a>

                    <a href="/recipes"
                       class="block w-full bg-white hover:bg-gray-50 text-amber-600 font-semibold py-3 px-4 rounded-lg border-2 border-amber-600 transition duration-300 transform hover:scale-105">
                        Browse Recipes
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
